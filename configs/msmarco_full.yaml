run:
  name: msmarco_full
  seed: 123
  deterministic: true
  device: auto

dataset:
  type: msmarco_passage
  root_dir: data/msmarco
  raw_dir: data/raw/msmarco
  download: true
  extract: true
  train_queries_tsv: queries.train.tsv
  eval_queries_tsv: queries.dev.small.tsv   # Switch to full dev if desired.
  eval_qrels_tsv: qrels.dev.small.tsv
  triples_tsv: triples.train.tsv
  # Optional safety knobs:
  # max_triples: 2000000
  # max_passages: 1000000

bm25:
  backend: pyserini
  k: 100

model:
  encoder_name: bert-base-uncased
  pooling: mean
  projection_dim: 768
  normalize: true

train:
  enabled: true
  epochs: 1
  batch_size: 64
  lr: 2.0e-5
  weight_decay: 0.01
  max_length: 256
  grad_clip_norm: 1.0
  log_every: 200
  eval_every: 2000

distillation:
  enabled: true
  teacher_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  temperature: 1.0
  alpha_kl: 0.5
  max_length: 256

faiss:
  enabled: true
  # This will evaluate both FlatIP and IVF-PQ.
  index_type: ivfpq
  nlist: 4096
  m: 32
  nbits: 8
  nprobe: 16
  k: 100

eval:
  k_values: [10, 100]
  latency_max_queries: 5000

artifacts_dir: artifacts

