run:
  name: smoke
  seed: 123
  deterministic: true
  device: auto

dataset:
  type: smoke_synthetic
  root_dir: data/smoke
  num_passages: 500
  num_queries: 50
  num_triples: 200
  vocab_size: 2000

bm25:
  backend: rank_bm25
  k: 10

model:
  encoder_name: distilbert-base-uncased
  pooling: mean
  projection_dim: 256
  normalize: true

train:
  # Keep smoke runs fast and offline (no model downloads / training).
  enabled: false
  epochs: 1
  batch_size: 16
  lr: 2.0e-5
  weight_decay: 0.01
  max_length: 128
  grad_clip_norm: 1.0
  log_every: 20
  eval_every: 50

distillation:
  enabled: false
  teacher_name: cross-encoder/ms-marco-MiniLM-L-2-v2
  temperature: 1.0
  alpha_kl: 0.5
  max_length: 256

faiss:
  enabled: false
  index_type: ivfpq
  # Keep small for smoke.
  nlist: 32
  m: 16
  nbits: 8
  nprobe: 4
  k: 10

eval:
  k_values: [10, 100]
  latency_max_queries: 50

artifacts_dir: artifacts
